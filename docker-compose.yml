services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis

  worker-chat:
    build:
      context: .
      dockerfile: services/worker-chat/Dockerfile
    shm_size: '2gb'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WORKER_ID=worker-chat
      - HEADLESS=true
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK}
      - CHAT_ACCOUNT_USER=${CHAT_ACCOUNT_USER}
      - CHAT_ACCOUNT_PWD=${CHAT_ACCOUNT_PWD}
      - CHAT_CHANNEL_URL=${CHAT_CHANNEL_URL}
    volumes:
      - ./auth:/app/auth
    depends_on:
      - redis

  worker-1:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    shm_size: '2gb'
    expose:
      - "3001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WORKER_ID=worker-1
      - HEADLESS=true
      - OMP_THREAD_LIMIT=1
      - NODE_OPTIONS=--max-old-space-size=4096
      - DEBUG=false
    volumes:
      - ./assets:/app/assets
      - ./auth:/app/auth
      - ./debug:/app/debug
    depends_on:
      - redis

  worker-2:
