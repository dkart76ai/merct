services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # Redis en RAM es rápido, pero con 128GB puedes darle persistencia sin miedo
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    shm_size: '2gb' # Evita que Playwright crashee
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - HEADLESS=true
      - DEBUG=true
      - OMP_THREAD_LIMIT=1 # Optimiza Tesseract para no saturar CPU
      - NODE_OPTIONS=--max-old-space-size=4096 # Dale 4GB de heap a cada Node
    volumes:
      - ./assets:/app/assets
      - ./auth:/app/auth
      - ./debug:/app/debug
    depends_on:
      - redis
    deploy:
      replicas: 6
      resources:
        limits:
          cpus: '1.5' # Límite para que Tesseract/Playwright no maten el host
          memory: 6G  # Tienes 128GB, sé generoso para evitar fugas de memoria

volumes:
  redis-data:
